name: ElavonPayments CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    env:
      RUN_CONTRACT_TESTS: ${{ vars.RUN_CONTRACT_TESTS || 'false' }}
      RUN_INTEGRATION_TESTS: ${{ vars.RUN_INTEGRATION_TESTS || 'false' }}
      RUN_SMOKE_TESTS: ${{ vars.RUN_SMOKE_TESTS || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test (Unit)
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Unit"

      - name: Test (Contract)
        if: env.RUN_CONTRACT_TESTS == 'true'
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Contract"

      - name: Test (Integration)
        if: env.RUN_INTEGRATION_TESTS == 'true'
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Integration"

      - name: Test (Smoke)
        if: env.RUN_SMOKE_TESTS == 'true'
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Smoke"
