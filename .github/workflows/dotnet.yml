name: ElavonPayments CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test:
    name: Build + All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore --configuration Release

      - name: Run unit tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Unit"

      - name: Run contract tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Contract"

      - name: Run integration tests
        run: dotnet test --no-build --configuration Release --verbosity normal --filter "Category=Integration"
